name: Release TokenAlign
on:
  push:
    tags: ['v*']

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: tokenalign-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: tokenalign-macos-m1
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: tokenalign-windows.exe

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Create release directory
        run: mkdir -p target/release
        shell: bash
      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: mv target/${{ matrix.target }}/release/tokenalign.exe target/release/${{ matrix.artifact_name }}
        shell: bash
      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/tokenalign target/release/${{ matrix.artifact_name }}
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
